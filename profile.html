<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>내 정보 — 모집 게시판</title>
<script>
  // 로그인하지 않았으면 로그인 페이지로
  if (!localStorage.getItem("recruit-session") && !sessionStorage.getItem("recruit-session")) {
    location.replace("login.html");
  }
</script>
<script src="store.js?v=6"></script>
<style>
  :root {
    --bg: hsl(0, 0%, 100%);
    --fg: hsl(0, 0%, 7%);
    --fg-soft: hsl(0, 0%, 40%);
    --line: hsl(0, 0%, 88%);
    --surface: hsl(0, 0%, 97%);
    --accent: hsl(217, 80%, 46%);
    --accent-strong: hsl(217, 85%, 38%);
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-6: 24px;
    --space-8: 32px;
    --space-12: 48px;
    --radius: 8px;
    --text-sm: 0.8125rem;
    --text-base: 1rem;
    --text-lg: 1.25rem;
    --text-xl: 1.5625rem;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: var(--space-8) var(--space-6) var(--space-12);
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-4);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: var(--text-xl);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .user-box { display: flex; align-items: center; gap: var(--space-3); }
  .nav-btn {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font: inherit;
    font-size: var(--text-sm);
    font-weight: 600;
    padding: var(--space-1) var(--space-3);
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: border-color 150ms ease-out;
  }
  .nav-btn:hover { border-color: var(--fg); }
  .nav-btn:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

  .card {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: var(--space-6);
    margin-top: var(--space-6);
  }
  .profile-banner {
    height: 120px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    margin-top: var(--space-6);
    background-color: var(--surface);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .banner-controls {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
    margin-top: var(--space-2);
  }
  .switch-row {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--fg-soft);
    cursor: pointer;
  }
  /* 토글 스위치 */
  .switch {
    appearance: none;
    -webkit-appearance: none;
    width: 40px;
    height: 22px;
    border-radius: 999px;
    background: var(--line);
    position: relative;
    cursor: pointer;
    transition: background 150ms ease-out;
    flex-shrink: 0;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--bg);
    transition: transform 150ms ease-out;
  }
  .switch:checked { background: var(--accent); }
  .switch:checked::after { transform: translateX(18px); }
  .switch:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .select-row {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--fg-soft);
  }
  .select-row select {
    font: inherit;
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--fg);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: var(--space-1) var(--space-2);
    cursor: pointer;
  }
  .select-row select:focus { outline: none; border-color: var(--accent); background: var(--bg); }
  .fit-adjust {
    display: inline-flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
    flex: 1;
  }
  .cos-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    padding: var(--space-3) 0;
    border-bottom: 1px dashed var(--line);
  }
  .cos-row:last-child { border-bottom: none; }
  .cos-info { display: flex; align-items: baseline; gap: var(--space-2); min-width: 0; }
  .cos-label { font-weight: 600; }
  .cos-name { font-size: var(--text-sm); color: var(--fg-soft); word-break: break-all; }
  .fit-segment {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .fit-btn {
    font: inherit;
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--fg-soft);
    background: var(--bg);
    border: none;
    padding: var(--space-2) var(--space-4);
    cursor: pointer;
    transition: background 150ms ease-out, color 150ms ease-out;
  }
  .fit-btn + .fit-btn { border-left: 1px solid var(--line); }
  .fit-btn.active { background: var(--accent); color: var(--bg); }
  .fit-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .pos-control {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--fg-soft);
    flex: 1;
    min-width: 160px;
  }
  .pos-control input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .card h2 {
    font-size: var(--text-lg);
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: var(--space-4);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    gap: var(--space-4);
    padding: var(--space-2) 0;
    border-bottom: 1px dashed var(--line);
    font-size: var(--text-base);
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .k { color: var(--fg-soft); font-size: var(--text-sm); font-weight: 600; }
  .info-row .v { font-weight: 600; word-break: break-all; text-align: right; }

  .field { margin-bottom: var(--space-4); }
  .field label {
    display: block;
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--fg-soft);
    margin-bottom: var(--space-2);
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    font: inherit;
    color: var(--fg);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: var(--space-3) var(--space-4);
    transition: border-color 150ms ease-out;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg);
  }
  input:disabled { color: var(--fg-soft); cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    font: inherit;
    font-size: var(--text-sm);
    font-weight: 700;
    padding: var(--space-2) var(--space-6);
    cursor: pointer;
    transition: background 150ms ease-out;
  }
  .btn-primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn-primary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-primary:disabled { background: var(--surface); color: var(--fg-soft); border-color: var(--line); cursor: not-allowed; }

  .btn-danger {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--fg);
    border-radius: var(--radius);
    font: inherit;
    font-size: var(--text-sm);
    font-weight: 700;
    padding: var(--space-2) var(--space-6);
    cursor: pointer;
    transition: background 150ms ease-out, color 150ms ease-out;
  }
  .btn-danger:hover { background: var(--fg); color: var(--bg); }
  .btn-danger:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

  .msg {
    font-size: var(--text-sm);
    font-weight: 600;
    margin-top: var(--space-3);
  }
  .msg.ok { color: var(--accent); }
  .msg.err {
    color: var(--fg);
    background: var(--surface);
    border: 1px solid var(--fg);
    border-radius: var(--radius);
    padding: var(--space-2) var(--space-3);
  }
  .hint {
    font-size: var(--text-sm);
    color: var(--fg-soft);
    margin-top: var(--space-2);
  }
  .avatar {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--fg);
    font-weight: 700;
    overflow: hidden;
    flex-shrink: 0;
    object-fit: cover;
  }
  .photo-row {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: var(--space-4);
    padding-bottom: var(--space-4);
    border-bottom: 1px dashed var(--line);
  }
  .photo-actions { display: flex; gap: var(--space-2); }

  /* ── 등급 뱃지 (랭킹 페이지와 동일한 색) ── */
  .tier {
    display: inline-block;
    font-size: var(--text-sm);
    font-weight: 700;
    border-radius: var(--space-1);
    padding: 0 var(--space-2);
    vertical-align: middle;
    white-space: nowrap;
  }
  .tier-seed {
    color: hsl(140, 55%, 26%);
    background: hsl(140, 50%, 90%);
    border: 1px solid hsl(140, 40%, 72%);
  }
  .tier-bronze {
    color: hsl(0, 0%, 100%);
    background: hsl(25, 52%, 44%);
    border: 1px solid hsl(25, 52%, 44%);
  }
  .tier-silver {
    color: hsl(210, 22%, 24%);
    background: hsl(210, 14%, 72%);
    border: 1px solid hsl(210, 14%, 72%);
  }
  .tier-gold {
    color: hsl(40, 85%, 22%);
    background: hsl(44, 88%, 54%);
    border: 1px solid hsl(44, 88%, 54%);
  }
  .tier-platinum {
    color: hsl(0, 0%, 100%);
    background: hsl(190, 45%, 46%);
    border: 1px solid hsl(190, 45%, 46%);
  }
  .tier-dia {
    color: hsl(0, 0%, 100%);
    background: hsl(205, 85%, 55%);
    border: 1px solid hsl(205, 85%, 55%);
    font-weight: 800;
  }

  @media (max-width: 480px) {
    .container { padding: var(--space-6) var(--space-4) var(--space-8); }
    header { gap: var(--space-3); }
    header h1 { font-size: var(--text-lg); }
    .user-box { flex-wrap: wrap; gap: var(--space-2); }
    .nav-btn { padding: var(--space-2) var(--space-3); min-height: 40px; display: inline-flex; align-items: center; }
    .card { padding: var(--space-4); }
    /* 버튼 터치 영역 확대 */
    .btn-primary, .btn-danger { min-height: 44px; padding: var(--space-3) var(--space-6); }
    .photo-actions { flex-wrap: wrap; }
    .photo-actions .btn-primary, .photo-actions .btn-danger { flex: 1; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>내 정보</h1>
    <div class="user-box">
      <a class="nav-btn" href="index.html">게시판으로</a>
      <a class="nav-btn" href="shop.html">상점</a>
      <button type="button" class="nav-btn" id="logout-btn">로그아웃</button>
    </div>
  </header>

  <div class="profile-banner" id="profile-banner" hidden></div>
  <div class="banner-controls" id="banner-controls" hidden>
    <label class="switch-row">
      <span>배너 표시</span>
      <input type="checkbox" id="banner-on" class="switch" />
    </label>
    <label class="select-row" id="banner-select-row" hidden>배너 선택
      <select id="banner-select"></select>
    </label>
    <div class="fit-adjust" id="fit-adjust" hidden>
      <div class="fit-segment">
        <button type="button" class="fit-btn" id="fit-cover">채우기</button>
        <button type="button" class="fit-btn" id="fit-contain">전체보기</button>
      </div>
      <label class="pos-control" for="banner-pos">위치
        <input type="range" id="banner-pos" min="0" max="100" step="1" value="50" />
      </label>
    </div>
  </div>

  <section class="card" id="cosmetics-card" hidden>
    <h2>배경 표시</h2>
    <p class="hint" style="margin-bottom: var(--space-4);">장착한 배경을 켜고 끌 수 있습니다.</p>
    <div class="cos-row" id="row-postbg" hidden>
      <div class="cos-info">
        <span class="cos-label">공고 배경</span>
        <span class="cos-name" id="postbg-name"></span>
      </div>
      <input type="checkbox" id="postbg-on" class="switch" aria-label="공고 배경 표시" />
    </div>
    <div class="cos-row" id="row-sitebg" hidden>
      <div class="cos-info">
        <span class="cos-label">사이트 배경</span>
        <span class="cos-name" id="sitebg-name"></span>
      </div>
      <input type="checkbox" id="sitebg-on" class="switch" aria-label="사이트 배경 표시" />
    </div>
  </section>

  <section class="card" aria-label="회원 정보">
    <h2>회원 정보</h2>
    <div class="photo-row">
      <span id="avatar-slot"></span>
      <div class="photo-actions">
        <button type="button" class="nav-btn" id="photo-btn">사진 변경</button>
        <button type="button" class="nav-btn" id="photo-del-btn">사진 삭제</button>
      </div>
      <input type="file" id="photo-input" accept="image/*" hidden />
    </div>
    <p class="msg" id="photo-msg" hidden></p>
    <div class="info-row"><span class="k">닉네임</span><span class="v" id="info-nick"></span></div>
    <div class="info-row"><span class="k">이메일</span><span class="v" id="info-email"></span></div>
    <div class="info-row"><span class="k">보유 포인트</span><span class="v" id="info-score"></span></div>
    <div class="info-row"><span class="k">누적 포인트</span><span class="v" id="info-earned"></span></div>
    <div class="info-row"><span class="k">등급</span><span class="v" id="info-tier"></span></div>
    <div class="info-row"><span class="k">매너온도</span><span class="v" id="info-temp"></span></div>
    <div class="info-row"><span class="k">가입일</span><span class="v" id="info-joined"></span></div>
    <div class="info-row"><span class="k">활동</span><span class="v" id="info-activity"></span></div>
  </section>

  <section class="card">
    <h2>닉네임 변경</h2>
    <form id="nick-form">
      <div class="field">
        <label for="new-nick">새 닉네임</label>
        <input type="text" id="new-nick" maxlength="20" required />
      </div>
      <button type="submit" class="btn-primary" id="nick-submit">닉네임 저장</button>
      <p class="msg" id="nick-msg" hidden></p>
      <p class="hint" id="nick-hint" hidden>관리자 계정의 닉네임은 '관리자'로 고정되어 변경할 수 없습니다.</p>
    </form>
  </section>

  <section class="card">
    <h2>비밀번호 변경</h2>
    <form id="pw-form">
      <div class="field">
        <label for="cur-pw">현재 비밀번호</label>
        <input type="password" id="cur-pw" required autocomplete="current-password" />
      </div>
      <div class="field">
        <label for="new-pw">새 비밀번호</label>
        <input type="password" id="new-pw" required minlength="6" autocomplete="new-password" placeholder="6자 이상" />
      </div>
      <button type="submit" class="btn-primary">비밀번호 변경</button>
      <p class="msg" id="pw-msg" hidden></p>
    </form>
  </section>

  <section class="card" id="delete-card">
    <h2>회원 탈퇴</h2>
    <p class="hint" style="margin-top:0; margin-bottom: var(--space-4);">
      탈퇴하면 작성한 공고, 신청 기록, 점수가 모두 삭제되며 되돌릴 수 없습니다.
    </p>
    <button type="button" class="btn-danger" id="delete-btn">회원 탈퇴</button>
  </section>
</div>

<script>
window.__storeReady.then(function () {
  var USERS_KEY = "recruit-users";
  var SCORES_KEY = "recruit-scores";
  var SESSION_KEY = "recruit-session";
  var POSTS_KEY = "recruit-posts";
  var SHOP_KEY = "recruit-shop";
  var ADMIN_EMAIL = "jaydenkyuwon@gmail.com";

  var userId = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
  if (!userId) return;
  var isAdmin = userId === ADMIN_EMAIL;

  function loadJSON(key, fallback) {
    try {
      return JSON.parse(localStorage.getItem(key)) || fallback;
    } catch (e) {
      return fallback;
    }
  }
  function loadUsers() { return loadJSON(USERS_KEY, {}); }
  function loadPosts() { return loadJSON(POSTS_KEY, []); }

  function clearSession() {
    localStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem(SESSION_KEY);
  }

  // 삭제된 계정의 세션이 남아 있으면 강제 로그아웃
  if (!loadUsers()[userId]) {
    clearSession();
    location.replace("login.html");
    return;
  }

  // 서버 액션 호출 후 최신 상태로 화면 갱신
  function syncAction(action, payload) {
    return window.Api.call(action, payload).then(function (d) {
      renderInfo();
      return d;
    });
  }

  function formatDate(ts) {
    var d = new Date(ts);
    function pad(n) { return n < 10 ? "0" + n : n; }
    return d.getFullYear() + "." + pad(d.getMonth() + 1) + "." + pad(d.getDate());
  }

  // 매너온도 색상: 10도 구간마다 변화 (낮으면 파랑=차가움, 높으면 빨강=뜨거움)
  function tempColor(t) {
    var hues = [225, 210, 190, 150, 95, 50, 35, 22, 10, 0];
    var n = (typeof t === "number") ? t : 36.5;
    var idx = Math.max(0, Math.min(9, Math.floor(n / 10)));
    return "hsl(" + hues[idx] + ", 80%, 42%)";
  }

  function showMsg(el, text, ok) {
    el.textContent = text;
    el.className = "msg " + (ok ? "ok" : "err");
    el.hidden = false;
  }

  function avatarEl(email, size) {
    var u = loadUsers()[email] || {};
    var el;
    if (u.photo) {
      el = document.createElement("img");
      el.src = u.photo;
      el.alt = (u.nickname || email) + " 프로필 사진";
    } else {
      el = document.createElement("span");
      var nick = u.nickname || email || "?";
      el.textContent = nick.charAt(0).toUpperCase();
      el.style.fontSize = Math.round(size * 0.45) + "px";
      el.setAttribute("aria-hidden", "true");
    }
    el.className = "avatar";
    el.style.width = size + "px";
    el.style.height = size + "px";
    return el;
  }

  function renderInfo() {
    var me = loadUsers()[userId];
    var posts = loadPosts();
    var scores = loadJSON(SCORES_KEY, {});
    var slot = document.getElementById("avatar-slot");
    slot.innerHTML = "";
    slot.appendChild(avatarEl(userId, 64));
    document.getElementById("info-nick").textContent = me.nickname || "-";
    document.getElementById("info-email").textContent = userId;
    // 보유 포인트(잔액) / 누적 포인트(잔액+사용액) — 등급·랭킹은 누적 기준
    var balance = scores[userId] || 0;
    var earned = balance + (me.spent || 0);
    document.getElementById("info-score").textContent = balance + "점";
    document.getElementById("info-earned").textContent = earned + "점";
    // 등급: 새싹 0~10, 브론즈 11~50, 실버 51~200, 골드 201~500, 플래티넘 501~1000, 다이아 1001~ (누적 기준)
    var tier = earned <= 10 ? { name: "새싹", cls: "tier-seed" }
      : earned <= 50 ? { name: "브론즈", cls: "tier-bronze" }
      : earned <= 200 ? { name: "실버", cls: "tier-silver" }
      : earned <= 500 ? { name: "골드", cls: "tier-gold" }
      : earned <= 1000 ? { name: "플래티넘", cls: "tier-platinum" }
      : { name: "다이아", cls: "tier-dia" };
    var tierEl = document.getElementById("info-tier");
    tierEl.innerHTML = "";
    var tierBadge = document.createElement("span");
    tierBadge.className = "tier " + tier.cls;
    tierBadge.textContent = tier.name;
    tierEl.appendChild(tierBadge);
    var temp = (typeof me.temp === "number") ? me.temp : 36.5;
    var tempEl = document.getElementById("info-temp");
    tempEl.textContent = "🌡 " + temp.toFixed(1) + "°C";
    tempEl.style.color = tempColor(temp);
    document.getElementById("info-joined").textContent = formatDate(me.createdAt || 0);
    var authored = posts.filter(function (p) { return p.authorId === userId; }).length;
    var applied = posts.filter(function (p) { return (p.applicants || []).indexOf(userId) !== -1; }).length;
    document.getElementById("info-activity").textContent = "작성 공고 " + authored + "건 · 참가 신청 " + applied + "건";
    document.getElementById("new-nick").value = me.nickname || "";

    // 배너: 표시 on/off · 배너 선택 · 사진 크기/위치 조절
    var banner = document.getElementById("profile-banner");
    var bannerControls = document.getElementById("banner-controls");
    var selectRow = document.getElementById("banner-select-row");
    var fitAdjust = document.getElementById("fit-adjust");
    var shop = window.Api.getShop();

    // 보유한 배너 목록
    var ownedBanners = (me.owned || [])
      .map(function (id) { for (var i = 0; i < shop.length; i++) { if (shop[i].id === id) return shop[i]; } return null; })
      .filter(function (it) { return it && it.type === "banner"; });

    if (ownedBanners.length === 0) {
      // 보유 배너 없음 — 컨트롤·배너 모두 숨김
      banner.hidden = true;
      bannerControls.hidden = true;
    } else {
      bannerControls.hidden = false;
      var on = !(me.cosmeticOn && me.cosmeticOn.banner === false);
      var selectedId = (me.equipped && me.equipped.banner) || "";
      document.getElementById("banner-on").checked = on;

      // 선택 드롭다운 채우기
      var sel = document.getElementById("banner-select");
      sel.innerHTML = "";
      var ph = document.createElement("option");
      ph.value = ""; ph.textContent = "— 선택 안 함 —";
      sel.appendChild(ph);
      ownedBanners.forEach(function (it) {
        var opt = document.createElement("option");
        opt.value = it.id; opt.textContent = it.name;
        sel.appendChild(opt);
      });
      sel.value = selectedId;

      selectRow.hidden = !on; // 표시 off면 선택도 숨김

      var bannerItem = on ? ownedBanners.filter(function (it) { return it.id === selectedId; })[0] : null;
      if (bannerItem) {
        var fit = (me.bannerFit === "contain") ? "contain" : "cover";
        var pos = (typeof me.bannerPos === "number") ? me.bannerPos : 50;
        banner.style.background = bannerItem.value;
        banner.style.backgroundColor = "var(--surface)"; // 전체보기 시 여백 배경
        banner.style.backgroundSize = fit;
        banner.style.backgroundPosition = "center " + pos + "%";
        banner.style.backgroundRepeat = "no-repeat";
        banner.hidden = false;
        document.getElementById("fit-cover").classList.toggle("active", fit === "cover");
        document.getElementById("fit-contain").classList.toggle("active", fit === "contain");
        document.getElementById("banner-pos").value = pos;
        fitAdjust.hidden = false;
      } else {
        banner.hidden = true;
        fitAdjust.hidden = true;
      }
    }

    renderCosmetics(me, shop);
  }

  // 공고 배경 · 사이트 배경 표시 on/off (장착한 것만 표시)
  function renderCosmetics(me, shop) {
    var rows = [
      { type: "postbg", rowId: "row-postbg", nameId: "postbg-name", onId: "postbg-on" },
      { type: "sitebg", rowId: "row-sitebg", nameId: "sitebg-name", onId: "sitebg-on" }
    ];
    var anyVisible = false;
    rows.forEach(function (r) {
      var id = (me.equipped && me.equipped[r.type]) || null;
      var item = null;
      for (var i = 0; i < shop.length; i++) { if (shop[i].id === id) { item = shop[i]; break; } }
      var row = document.getElementById(r.rowId);
      if (item) {
        document.getElementById(r.nameId).textContent = item.name;
        document.getElementById(r.onId).checked = !(me.cosmeticOn && me.cosmeticOn[r.type] === false);
        row.hidden = false;
        anyVisible = true;
      } else {
        row.hidden = true;
      }
    });
    document.getElementById("cosmetics-card").hidden = !anyVisible;
  }

  function toggleCosmetic(type, on) {
    window.Api.call("setCosmeticOn", { type: type, on: on })
      .then(function () { renderInfo(); })
      .catch(function (e) { alert(e.message || "설정 저장에 실패했습니다."); });
  }
  document.getElementById("postbg-on").addEventListener("change", function () {
    toggleCosmetic("postbg", this.checked);
  });
  document.getElementById("sitebg-on").addEventListener("change", function () {
    toggleCosmetic("sitebg", this.checked);
  });

  // 배너 표시 on/off
  document.getElementById("banner-on").addEventListener("change", function () {
    window.Api.call("setCosmeticOn", { type: "banner", on: this.checked })
      .then(function () { renderInfo(); })
      .catch(function (e) { alert(e.message || "설정 저장에 실패했습니다."); });
  });
  // 배너 선택 (보유한 배너 중 장착)
  document.getElementById("banner-select").addEventListener("change", function () {
    window.Api.call("equipItem", { type: "banner", id: this.value || null })
      .then(function () { renderInfo(); })
      .catch(function (e) { alert(e.message || "설정 저장에 실패했습니다."); });
  });

  // 배너 조절 컨트롤 (채우기/전체보기 · 상하 위치) — 화면(슬라이더/버튼)을 기준으로 값 결정
  var posInput = document.getElementById("banner-pos");
  function currentPos() { return parseInt(posInput.value, 10) || 0; }
  function currentFit() {
    return document.getElementById("fit-contain").classList.contains("active") ? "contain" : "cover";
  }
  function saveBannerView(fit, pos) {
    var banner = document.getElementById("profile-banner");
    banner.style.backgroundSize = fit;
    banner.style.backgroundPosition = "center " + pos + "%";
    document.getElementById("fit-cover").classList.toggle("active", fit === "cover");
    document.getElementById("fit-contain").classList.toggle("active", fit === "contain");
    window.Api.call("setBannerView", { fit: fit, pos: pos }).catch(function (e) {
      alert(e.message || "설정 저장에 실패했습니다.");
    });
  }
  document.getElementById("fit-cover").addEventListener("click", function () {
    saveBannerView("cover", currentPos());
  });
  document.getElementById("fit-contain").addEventListener("click", function () {
    saveBannerView("contain", currentPos());
  });
  posInput.addEventListener("input", function () {
    // 드래그 중엔 화면만 갱신
    document.getElementById("profile-banner").style.backgroundPosition = "center " + currentPos() + "%";
  });
  posInput.addEventListener("change", function () {
    // 놓았을 때 서버 저장
    saveBannerView(currentFit(), currentPos());
  });

  /* ── 프로필 사진 ─────────────── */
  var photoMsg = document.getElementById("photo-msg");
  var photoInput = document.getElementById("photo-input");

  document.getElementById("photo-btn").addEventListener("click", function () {
    photoInput.click();
  });

  photoInput.addEventListener("change", function () {
    var file = photoInput.files[0];
    photoInput.value = "";
    if (!file) return;
    if (!file.type || file.type.indexOf("image/") !== 0) {
      showMsg(photoMsg, "이미지 파일을 선택해주세요.", false);
      return;
    }
    if (file.size > 25 * 1024 * 1024) {
      showMsg(photoMsg, "25MB 이하의 이미지를 선택해주세요.", false);
      return;
    }
    var reader = new FileReader();
    reader.onload = function () {
      var img = new Image();
      img.onload = function () {
        // 정사각형으로 가운데 크롭 후 128px로 축소해 저장 용량 최소화
        var canvas = document.createElement("canvas");
        canvas.width = 128;
        canvas.height = 128;
        var ctx = canvas.getContext("2d");
        var side = Math.min(img.width, img.height);
        ctx.drawImage(img, (img.width - side) / 2, (img.height - side) / 2, side, side, 0, 0, 128, 128);
        var dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        syncAction("setPhoto", { photo: dataUrl }).then(function () {
          showMsg(photoMsg, "프로필 사진이 변경되었습니다.", true);
        }).catch(function (e2) {
          showMsg(photoMsg, e2.message || "사진 변경에 실패했습니다.", false);
        });
      };
      img.onerror = function () {
        showMsg(photoMsg, "이미지를 읽을 수 없습니다.", false);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById("photo-del-btn").addEventListener("click", function () {
    var users = loadUsers();
    if (!users[userId].photo) {
      showMsg(photoMsg, "삭제할 프로필 사진이 없습니다.", false);
      return;
    }
    if (!confirm("프로필 사진을 삭제할까요?")) return;
    syncAction("setPhoto", { photo: null }).then(function () {
      showMsg(photoMsg, "프로필 사진이 삭제되었습니다.", true);
    }).catch(function (e2) {
      showMsg(photoMsg, e2.message || "삭제에 실패했습니다.", false);
    });
  });

  /* ── 닉네임 변경 ─────────────── */
  var nickMsg = document.getElementById("nick-msg");
  if (isAdmin) {
    document.getElementById("new-nick").disabled = true;
    document.getElementById("nick-submit").disabled = true;
    document.getElementById("nick-hint").hidden = false;
  }
  document.getElementById("nick-form").addEventListener("submit", function (e) {
    e.preventDefault();
    if (isAdmin) return;
    var nick = document.getElementById("new-nick").value.trim();
    if (!nick || nick.length > 20) {
      showMsg(nickMsg, "닉네임은 1~20자로 입력해주세요.", false);
      return;
    }
    syncAction("setNickname", { nickname: nick }).then(function () {
      showMsg(nickMsg, "닉네임이 변경되었습니다.", true);
    }).catch(function (e2) {
      showMsg(nickMsg, e2.message || "변경에 실패했습니다.", false);
    });
  });

  /* ── 비밀번호 변경 ───────────── */
  var pwMsg = document.getElementById("pw-msg");
  document.getElementById("pw-form").addEventListener("submit", function (e) {
    e.preventDefault();
    var cur = document.getElementById("cur-pw").value;
    var next = document.getElementById("new-pw").value;
    if (next.length < 6) {
      showMsg(pwMsg, "새 비밀번호는 6자 이상이어야 합니다.", false);
      return;
    }
    window.Api.call("setPassword", { current: cur, next: next }).then(function () {
      document.getElementById("pw-form").reset();
      showMsg(pwMsg, "비밀번호가 변경되었습니다.", true);
    }).catch(function (e2) {
      showMsg(pwMsg, e2.message || "변경에 실패했습니다.", false);
    });
  });

  /* ── 회원 탈퇴 ───────────────── */
  if (isAdmin) {
    // 관리자는 시스템 계정이라 탈퇴 불가
    document.getElementById("delete-card").hidden = true;
  } else {
    document.getElementById("delete-btn").addEventListener("click", function () {
      if (!confirm("정말 탈퇴할까요? 작성한 공고, 신청 기록, 점수가 모두 삭제됩니다.")) return;
      if (!confirm("이 작업은 되돌릴 수 없습니다. 계속할까요?")) return;
      window.Api.call("deleteAccount", {}).then(function () {
        window.Api.clearAuth();
        location.replace("login.html");
      }).catch(function (e2) {
        alert(e2.message || "탈퇴에 실패했습니다.");
      });
    });
  }

  document.getElementById("logout-btn").addEventListener("click", function () {
    window.Api.call("logout", {}).catch(function () {});
    window.Api.clearAuth();
    location.replace("login.html");
  });

  renderInfo();
});
</script>

</body>
</html>
